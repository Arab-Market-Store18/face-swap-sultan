name: Build Sultan Hybrid FaceSwap

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تحديث للنسخة 4

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # تحديث للنسخة 3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5 # تحديث للنسخة 5
        with:
          context: .
          push: true
          # تفعيل الـ Cache لتسريع البناء في المرات القادمة
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            shababd11/face-swap-sultan:latest
            shababd11/face-swap-sultan:hybrid
